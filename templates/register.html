<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/css/style.css">

    <!-- Face API -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>

    <div class="container">
        <h2>Register</h2>

        <!-- IDs added -->
        <input id="emp_id" placeholder="Employee ID">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="dept" placeholder="Department">
        <input id="password" type="password" placeholder="Password">

        <div class="role-container">
            <label for="role">Select Role</label>
            <select id="role">
                <option value="employee">Employee</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <!-- Camera -->
        <video id="video" width="280" height="220" autoplay muted></video>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

        <p id="status"></p>

        <button onclick="startCamera()">Start Camera</button>
        <button onclick="startVerification()">Capture Face</button>
        <button onclick="registerUser()">Register</button>

        <div style="margin-top:15px;">
            <button class="secondary" onclick="goBack()">Back</button>
        </div>
    </div>

    <script src="/frontend/js/utils.js"></script>
    <script src="/frontend/js/register.js"></script>

    <script>
        function goBack() {
            window.location.href = "/";
        }
    </script>

</body>

</html>
